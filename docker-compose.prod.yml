version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tournament_postgres_prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: tournament_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tournament_network
    restart: unless-stopped

  
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tournament_api_prod
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/tournament_db?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production
      PORT: 3000
    depends_on:
      - postgres
    networks:
      - tournament_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  
  nginx:
    image: nginx:alpine
    container_name: tournament_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - tournament_network
    restart: unless-stopped



volumes:
    postgres_data:
      driver: local

networks:
    tournament_network:
      driver: bridge

  

  